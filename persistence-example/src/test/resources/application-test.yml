spring:
  datasource:
    url: jdbc:h2:mem:order_service_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

logging:
  level:
    com.maiya.persistence.example.service.OrderServiceTest: INFO
